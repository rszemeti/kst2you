# Deploy static content to GitHub Pages on release tags only
# Also builds OpenSkyAuthenticator.exe and attaches it to the release
name: Deploy static content to Pages

on:
  push:
    tags:
      - 'v*'

  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-authenticator:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r opensky_integration/authenticator/requirements.txt
      - name: Build exe
        run: |
          cd opensky_integration/authenticator
          pyinstaller --onefile --windowed --name "OpenSkyAuthenticator" opensky_auth.py
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSkyAuthenticator
          path: opensky_integration/authenticator/dist/OpenSkyAuthenticator.exe

  attach-to-release:
    needs: build-authenticator
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenSkyAuthenticator
      - name: Attach exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenSkyAuthenticator.exe

  deploy:
    needs: build-authenticator
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
